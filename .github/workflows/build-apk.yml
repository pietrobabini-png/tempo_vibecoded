name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build debug APK
        run: ./gradlew assembleTempoDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: tempo-vibecoded-debug
          path: app/build/outputs/apk/tempo/debug/app-tempo-debug.apk
